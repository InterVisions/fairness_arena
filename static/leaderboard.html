<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fairness Arena — Leaderboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root {
    --bg: #fafafa; --bg-card: #ffffff; --text: #1a1a2e; --text-dim: #6b7280;
    --accent: #4f46e5; --border: #e5e7eb; --gold: #f59e0b; --silver: #9ca3af; --bronze: #d97706;
    --font: 'IBM Plex Sans', sans-serif; --mono: 'IBM Plex Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
  .header a { font-size: 0.8rem; color: var(--text-dim); text-decoration: none; }

  .container { max-width: 700px; margin: 40px auto; padding: 0 24px; }

  .subtitle { text-align: center; color: var(--text-dim); font-size: 0.85rem; margin-bottom: 32px; }

  .leaderboard-card {
    background: var(--bg-card);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .lb-row {
    display: grid;
    grid-template-columns: 50px 1fr 100px 120px;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .lb-row:hover { background: #f9fafb; }
  .lb-row:last-child { border-bottom: none; }

  .lb-rank {
    font-family: var(--mono);
    font-size: 1.2rem;
    font-weight: 700;
    text-align: center;
  }
  .lb-rank.gold { color: var(--gold); }
  .lb-rank.silver { color: var(--silver); }
  .lb-rank.bronze { color: var(--bronze); }

  .lb-name { font-weight: 600; font-size: 0.95rem; }
  .lb-elo { font-family: var(--mono); font-weight: 700; font-size: 1.1rem; text-align: right; }
  .lb-record { font-family: var(--mono); font-size: 0.75rem; color: var(--text-dim); text-align: right; }

  .update-note { text-align: center; margin-top: 16px; font-size: 0.7rem; color: var(--text-dim); font-family: var(--mono); }
</style>
</head>
<body>

<div class="header">
  <h1>⚖️ Fairness Arena</h1>
  <a href="/">← Back to Arena</a>
</div>

<div class="container">
  <h2 style="text-align:center;font-size:1.5rem;margin-bottom:8px">🏆 Fairness Leaderboard</h2>
  <p class="subtitle">Which CLIP model retrieves the most diverse and representative images?<br>Ranked by community votes using the Elo rating system.</p>

  <div class="leaderboard-card" id="leaderboard"></div>
  <div class="update-note" id="update-note"></div>
</div>

<script>
async function loadLeaderboard() {
  const resp = await fetch('/api/leaderboard');
  const data = await resp.json();
  const lb = document.getElementById('leaderboard');
  lb.innerHTML = '';

  const medals = ['gold', 'silver', 'bronze'];

  data.ratings.forEach((r, i) => {
    const rankClass = i < 3 ? medals[i] : '';
    const rankText = i < 3 ? ['🥇','🥈','🥉'][i] : `${i+1}`;
    const games = r.wins + r.losses + r.ties;
    lb.innerHTML += `
      <div class="lb-row">
        <div class="lb-rank ${rankClass}">${rankText}</div>
        <div class="lb-name">${r.display_name || r.model_id}</div>
        <div class="lb-record">${r.wins}W ${r.losses}L ${r.ties}T</div>
        <div class="lb-elo">${Math.round(r.rating)}</div>
      </div>`;
  });

  document.getElementById('update-note').textContent =
    `${data.ratings.reduce((s,r) => s + r.wins + r.losses + r.ties, 0) / 2} total comparisons · updates live`;
}

loadLeaderboard();
setInterval(loadLeaderboard, 15000);
</script>
</body>
</html>
